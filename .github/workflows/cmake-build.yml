name: CMake Build

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure CMake
        run: cmake -B build

      - name: Build
        run: cmake --build build
        continue-on-error: true

      - name: Test
        run: ctest --test-dir build --output-on-failure
        continue-on-error: true

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    outputs:
      released:       ${{ steps.semrel.outputs.new_release_published }}
      version:        ${{ steps.semrel.outputs.new_release_version }}
      version_major:  ${{ steps.semrel.outputs.new_release_major_version }}
      version_minor:  ${{ steps.semrel.outputs.new_release_minor_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run semantic-release
        id: semrel
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
